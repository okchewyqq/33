name: stream-proxy-test

on:
  push:
    branches:
      - test/stream-proxy
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test-build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: stream-proxy-test:local

      - name: Smoke test container routes
        run: |
          set -eux
          docker run -d --rm --name stream-proxy-test -p 8080:8080 \
            -e XRAY_ENABLED=false \
            -e ALLOW_PRIVATE_PROXY_TARGETS=true \
            stream-proxy-test:local
          trap 'docker stop stream-proxy-test' EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz | grep -q '^ok$'; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/ | grep -q 'URL relay'
          curl -fsSI http://127.0.0.1:8080/v2/ | grep -Ei 'HTTP/.* (200|401)'
          curl -fsS "http://127.0.0.1:8080/proxy?url=https://example.com/" | grep -qi 'example'

      - name: Login to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: success()
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stream-proxy-test
            type=sha,prefix=stream-proxy-sha-

      - name: Build and push test image
        if: success()
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
